version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hairsup_db
    environment:
      POSTGRES_USER: hairsup_user
      POSTGRES_PASSWORD: hairsup_pass
      POSTGRES_DB: hairsup_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hairsup_user -d hairsup_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hairsup_backend
    environment:
      DATABASE_URL: postgresql://hairsup_user:hairsup_pass@postgres:5432/hairsup_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      PORT: 5000
      NODE_ENV: development
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hairsup_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
